databases:
  - name: workhead
    databaseName: workhead
    user: workhead
    plan: free

services:
  - type: web
    name: ilmeori
    runtime: ruby
    plan: free
    region: singapore
    buildCommand: |
      bundle install
      bundle exec rails assets:precompile
      bundle exec rails db:migrate
      bundle exec rails db:seed
    startCommand: bundle exec rails server -b 0.0.0.0
    envVars:
      - key: RAILS_ENV
        value: production
      - key: RAILS_SERVE_STATIC_FILES
        value: "true"
      - key: RAILS_LOG_TO_STDOUT
        value: "true"
      - key: SECRET_KEY_BASE
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: workhead
          property: connectionString
